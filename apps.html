<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>アプリ一覧 | くまポップラボ</title>
  <meta
    name="description"
    content="くまポップラボの公開中アプリ一覧。新着から過去のアプリまでまとめて確認できます。"
  />
  <meta name="theme-color" content="#ffdcb8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&amp;family=Zen+Maru+Gothic:wght@400;500;700;900&amp;display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg" aria-hidden="true">
    <span class="blob blob--a"></span>
    <span class="blob blob--b"></span>
    <span class="blob blob--c"></span>
  </div>

  <header class="site-header">
    <a class="brand" href="index.html" aria-label="くまポップラボのトップへ">
      <span class="brand__icon">🐻</span>
      <span class="brand__name">くまポップラボ</span>
    </a>
    <div class="header-actions">
      <a class="header-cta header-cta--outline" href="portfolio/">ポートフォリオ</a>
      <a class="header-cta" href="index.html#apps">トップへ戻る</a>
    </div>
  </header>

  <main class="page">
    <section class="sub-hero reveal">
      <p class="eyebrow">App Archive</p>
      <h1 class="hero__title">公開アプリ一覧</h1>
      <p class="hero__lead">
        最新アプリから、これまでに公開したアプリまでまとめてチェックできます。
      </p>
      <div class="sub-hero__actions">
        <a class="btn btn--primary" href="index.html#apps">トップの新着3件を見る</a>
        <a class="btn btn--ghost" href="portfolio/">制作ポートフォリオを見る</a>
      </div>
    </section>

    <section class="section reveal">
      <div class="section-heading">
        <p class="section-heading__label">All Released Apps</p>
        <h2>すべての公開アプリ</h2>
        <p>公開中のアプリを新着順で表示しています。</p>
      </div>
      <div id="app-list-all" class="app-grid" aria-live="polite"></div>
    </section>
  </main>

  <footer class="site-footer">
    <small>© <span data-year></span> くまポップラボ</small>
  </footer>

  <script src="main.js"></script>
</body>
</html>
